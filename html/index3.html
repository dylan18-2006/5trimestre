<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/estilo3.css">
    <title>Bienvenidos Fitnes</title>
</head>

<body background="https://upload.wikimedia.org/wikipedia/en/f/fd/MT_LN_Vol26_cropped.jpeg">

    <div class="container my-5 p-4 border rounded bg-white shadow"> 

        <h1 class="text-center text-primary mb-4">Actividad con Bootstrap 5</h1>

        
        <div class="row mb-4">
            <div class="col-6 md-6">
                <div class="p-3 border border-success">
                    <h2 class="text-success">Columna 1</h2>
                    <p>Tengo sueñooooo</p>
                </div>
            </div>
            <div class="col-6 md-6">
                <div class="p-3 border border-danger">
                    <h2 class="text-danger">Columna 2</h2>
                    <p>Se me olvido como los redondeoooo</p>
                </div>
            </div>
        </div>
        <div class="text-center mb-4">
            <img src="https://i.pinimg.com/736x/e4/f2/a8/e4f2a88aeac0f4ece64e174fa35dbe6b.jpg"
                class="rounded-circle border border-secondary p-1"
                style="width: 200px; height: 200px; object-fit: cover;" alt="Usuario">
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary w-40">Click Fitnes</button>
        </div>


        <h1 class="text-primary mb-2">Tabla de Datos</h1>
        <table class="table table-bordered table-sm table-hover">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Edad</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Ana</td>
                    <td>25</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Juan</td>
                    <td>30</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>María</td>
                    <td>22</td>
                </tr>
            </tbody>
        </table>

    </div>
</body>

</html>
